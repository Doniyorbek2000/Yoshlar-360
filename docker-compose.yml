version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: yoshlar-360-postgres
    environment:
      POSTGRES_USER: yoshlar
      POSTGRES_PASSWORD: yoshlar360
      POSTGRES_DB: yoshlar_360_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoshlar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yoshlar-network

  redis:
    image: redis:7-alpine
    container_name: yoshlar-360-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yoshlar-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: yoshlar-360-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://yoshlar:yoshlar360@postgres:5432/yoshlar_360_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-key-change-in-production}
      API_PORT: 3000
      CORS_ORIGINS: http://localhost:3001,http://localhost
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yoshlar-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: yoshlar-360-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    ports:
      - "3001:3001"
    depends_on:
      - api
    networks:
      - yoshlar-network

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: yoshlar-360-bot
    environment:
      DATABASE_URL: postgresql://yoshlar:yoshlar360@postgres:5432/yoshlar_360_db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-your-telegram-bot-token}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yoshlar-network

  nginx:
    image: nginx:alpine
    container_name: yoshlar-360-nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
    networks:
      - yoshlar-network

volumes:
  postgres_data:
  redis_data:

networks:
  yoshlar-network:
    driver: bridge
